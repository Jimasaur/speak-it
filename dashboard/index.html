<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Speak It Dashboard</title>
<style>
:root{--bg:#08050f;--panel:#141021;--panel2:#1d1730;--text:#fbf7ec;--muted:#b9adc9;--gold:#d9b76f;--purple:#8f6cff;--line:rgba(255,255,255,.12);--ok:#70e0a0;--warn:#f1c86b;--bad:#ff7a9a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% -10%,rgba(143,108,255,.32),transparent 28rem),radial-gradient(circle at 88% 20%,rgba(217,183,111,.14),transparent 30rem),linear-gradient(135deg,#08050f,#120d20 55%,#090612);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;overflow-x:hidden}.app{width:min(1280px,calc(100% - 32px));margin:0 auto;padding:20px 0 28px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:20px}.brand{font-weight:900;letter-spacing:-.04em;font-size:24px}.brand span{color:var(--gold)}.meta{color:var(--muted);font-size:13px}.client{display:flex;gap:10px;align-items:center}.client input{width:170px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.07);color:var(--text);padding:10px 12px}.btn{border:0;cursor:pointer;border-radius:999px;padding:10px 14px;font-weight:800;background:linear-gradient(135deg,var(--gold),#fff0b5);color:#120d20}.btn.ghost{background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--text)}.layout{display:grid;grid-template-columns:1.05fr .95fr;gap:18px}.stage{position:relative;min-height:720px;border:1px solid var(--line);border-radius:34px;background:rgba(255,255,255,.055);overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.34)}.stage:before{content:"";position:absolute;inset:11%;border:1px solid rgba(217,183,111,.2);border-radius:50%;opacity:.8}.stage:after{content:"";position:absolute;inset:24%;border:1px solid rgba(143,108,255,.22);border-radius:50%;opacity:.8}.orb{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:172px;height:172px;border-radius:50%;display:grid;place-items:center;text-align:center;background:radial-gradient(circle at 35% 25%,#fff 0 7%,var(--gold) 8% 17%,var(--purple) 43%,#171026 76%);box-shadow:0 0 80px rgba(143,108,255,.58),0 0 44px rgba(217,183,111,.22);z-index:2;cursor:pointer;transition:.25s}.orb:hover{transform:translate(-50%,-50%) scale(1.04)}.orb.listening{animation:pulse 1s infinite}@keyframes pulse{50%{transform:translate(-50%,-50%) scale(1.09)}}.orb b{font-size:14px;letter-spacing:.14em}.orb small{display:block;color:#24182f;margin-top:2px;font-weight:900}.node{position:absolute;left:50%;top:48%;width:108px;height:108px;margin:-54px;border-radius:28px;border:1px solid var(--line);background:rgba(20,16,33,.82);display:grid;place-items:center;text-align:center;gap:2px;z-index:3;cursor:pointer;transition:.2s;box-shadow:0 16px 50px rgba(0,0,0,.25)}.node:hover,.node.active{border-color:rgba(217,183,111,.55);transform:var(--pos) scale(1.08)}.node{transform:var(--pos)}.node .ico{font-size:25px}.node .label{font-size:12px;color:#eadffc;font-weight:750}.badge{position:absolute;top:-8px;right:-8px;background:var(--bad);color:white;border-radius:999px;font-size:12px;font-weight:900;min-width:24px;height:24px;display:grid;place-items:center}.n0{--pos:translate(-50%,-330px)}.n1{--pos:translate(185px,-270px)}.n2{--pos:translate(276px,-54px)}.n3{--pos:translate(185px,160px)}.n4{--pos:translate(-50%,220px)}.n5{--pos:translate(-285px,160px)}.n6{--pos:translate(-376px,-54px)}.n7{--pos:translate(-285px,-270px)}.command{position:absolute;left:24px;right:24px;bottom:24px;z-index:5;border:1px solid var(--line);border-radius:24px;background:rgba(8,5,15,.78);backdrop-filter:blur(14px);padding:14px;display:grid;grid-template-columns:1fr auto;gap:10px;transform:translateY(0);transition:.25s}.command.hidden{transform:translateY(130%)}.command input{border:0;background:transparent;color:var(--text);font:inherit;outline:0;padding:10px}.side{display:grid;gap:18px}.panel{border:1px solid var(--line);border-radius:30px;background:rgba(255,255,255,.06);overflow:hidden}.panel-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;padding:20px;border-bottom:1px solid var(--line)}.panel-head h2{margin:0;font-size:28px;letter-spacing:-.04em}.panel-head p{margin:5px 0 0;color:var(--muted);line-height:1.45}.list{display:grid}.item{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:15px 18px;border-top:1px solid rgba(255,255,255,.08)}.item:first-child{border-top:0}.icon{width:38px;height:38px;border-radius:14px;display:grid;place-items:center;background:rgba(217,183,111,.12)}.item strong{display:block}.item small{color:var(--muted);display:block;margin-top:3px}.actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.mini{border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);border-radius:999px;padding:8px 10px;font-weight:800;cursor:pointer}.mini.ok{background:rgba(112,224,160,.16);border-color:rgba(112,224,160,.3)}.mini.bad{background:rgba(255,122,154,.13);border-color:rgba(255,122,154,.25)}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}.metric{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.055);padding:14px}.metric b{font-size:25px;display:block}.metric span{color:var(--muted);font-size:12px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120px);background:#fbf7ec;color:#120d20;border-radius:999px;padding:12px 16px;font-weight:850;z-index:20;transition:.25s}.toast.show{transform:translateX(-50%) translateY(0)}.logline{padding:13px 18px;border-top:1px solid rgba(255,255,255,.08);color:#e8def5}.logline small{display:block;color:var(--muted);margin-top:4px}.empty{padding:24px;color:var(--muted);text-align:center}@media(max-width:980px){.layout{grid-template-columns:1fr}.stage{min-height:560px}.node{width:86px;height:86px;margin:-43px;border-radius:22px}.n0{--pos:translate(-50%,-240px)}.n1{--pos:translate(130px,-200px)}.n2{--pos:translate(190px,-43px)}.n3{--pos:translate(130px,115px)}.n4{--pos:translate(-50%,155px)}.n5{--pos:translate(-216px,115px)}.n6{--pos:translate(-276px,-43px)}.n7{--pos:translate(-216px,-200px)}.metrics{grid-template-columns:repeat(2,1fr)}}@media(max-width:600px){.stage:before,.stage:after{display:none}.stage{min-height:auto;padding:18px}.orb{position:relative;left:auto;top:auto;transform:none;margin:8px auto 20px}.orb:hover,.orb.listening{transform:none}.node{position:relative;left:auto;top:auto;transform:none!important;margin:0;width:auto;height:auto;min-height:70px}.stage-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.command{position:relative;left:auto;right:auto;bottom:auto;margin-top:14px;grid-template-columns:1fr}.command.hidden{transform:none}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="app">
  <header class="top"><div><div class="brand">Speak <span>It</span></div><div class="meta" id="dateLine"></div></div><div class="client"><input id="clientName" /><button class="btn ghost" id="resetBtn">Reset demo</button><a class="btn ghost" href="../">Landing</a></div></header>
  <div class="metrics" id="metrics"></div>
  <main class="layout">
    <section class="stage"><div class="orb" id="orb"><div><b id="orbText">SPEAK</b><small>voice demo</small></div></div><div class="stage-grid" id="nodes"></div><form class="command hidden" id="command"><input id="commandText" placeholder='Try: "order office supplies", "move my 3pm", "summarize inbox"' /><button class="btn" type="submit">Send</button></form></section>
    <aside class="side"><section class="panel"><div class="panel-head"><div><h2 id="panelTitle">Approvals</h2><p id="panelSub">External actions waiting for your say-so.</p></div><button class="btn ghost" id="openSpeak">Speak</button></div><div class="list" id="panelList"></div></section><section class="panel"><div class="panel-head"><div><h2>Agent log</h2><p>What the assistant did, proposed, or decided to wait on.</p></div></div><div class="list" id="logList"></div></section></aside>
  </main>
</div><div class="toast" id="toast"></div>
<script>
const qs=new URLSearchParams(location.search);const initialName=qs.get('name')||localStorage.getItem('speakit.clientName')||'Sarah';
const defaults={clientName:initialName,active:'approvals',items:[
{id:'a1',area:'approvals',icon:'💳',title:'Send sponsorship invoice',detail:'Drafted $280 invoice to Northside Boosters',status:'waiting',actions:['approve','dismiss']},
{id:'a2',area:'approvals',icon:'🛒',title:'Order office supplies',detail:'3 items · Amazon · $41.97 · arrives Saturday',status:'waiting',actions:['approve','dismiss']},
{id:'a3',area:'approvals',icon:'✉️',title:'Send follow-up email',detail:'Polite nudge drafted for Sam after yesterday’s call',status:'waiting',actions:['approve','edit','dismiss']},
{id:'i1',area:'inbox',icon:'📩',title:'Inbox summarized',detail:'12 new messages · 2 need you · 4 archived as noise',status:'done',actions:['view']},
{id:'c1',area:'calendar',icon:'📅',title:'Protected focus block',detail:'Moved low-priority 3 PM to tomorrow; awaiting final confirmation',status:'waiting',actions:['approve','dismiss']},
{id:'s1',area:'shopping',icon:'📦',title:'Gift options found',detail:'3 birthday gift options under $75 saved for review',status:'ready',actions:['view','dismiss']},
{id:'f1',area:'finances',icon:'💰',title:'Bill variance detected',detail:'Internet bill is $18 higher than usual; agent can call',status:'waiting',actions:['approve','dismiss']},
{id:'m1',area:'community',icon:'🏟️',title:'Practice update drafted',detail:'Message to parents with arrival time and field change',status:'waiting',actions:['approve','edit','dismiss']},
{id:'fam1',area:'family',icon:'🏠',title:'Weekend logistics',detail:'Two errands grouped near Target; 38 min route',status:'ready',actions:['view']}
],log:[{t:'Now',m:'Demo dashboard loaded. Same agent context across voice, web, text, and email.'},{t:'8 min ago',m:'Drafted follow-up email; held for approval.'},{t:'22 min ago',m:'Found office supplies and queued purchase for approval.'},{t:'41 min ago',m:'Summarized inbox and archived low-signal messages.'}]};
let state=load();function load(){try{return JSON.parse(localStorage.getItem('speakit.demo'))||defaults}catch{return defaults}}function save(){localStorage.setItem('speakit.demo',JSON.stringify(state))}
const areas=[['approvals','✓','Approvals'],['inbox','✉','Inbox'],['calendar','◷','Calendar'],['shopping','◼','Shopping'],['finances','$','Finances'],['community','◌','Community'],['family','⌂','Family'],['log','≡','Agent Log']];
function render(){document.getElementById('clientName').value=state.clientName;localStorage.setItem('speakit.clientName',state.clientName);renderMetrics();renderNodes();renderPanel();renderLog();save()}
function waitingCount(area){return state.items.filter(i=>i.area===area&&i.status==='waiting').length}function areaItems(area){return state.items.filter(i=>i.area===area)}
function renderMetrics(){const waiting=state.items.filter(i=>i.status==='waiting').length;const done=state.items.filter(i=>i.status==='done'||i.status==='approved').length;const ready=state.items.filter(i=>i.status==='ready').length;document.getElementById('metrics').innerHTML=[['Waiting',waiting],['Handled',done],['Ready',ready],['Channels',4]].map(x=>`<div class="metric"><b>${x[1]}</b><span>${x[0]}</span></div>`).join('')}
function renderNodes(){document.getElementById('nodes').innerHTML=areas.map((a,idx)=>{const c=waitingCount(a[0]);return `<button class="node n${idx} ${state.active===a[0]?'active':''}" onclick="setActive('${a[0]}')"><span class="ico">${a[1]}</span><span class="label">${a[2]}</span>${c?`<span class="badge">${c}</span>`:''}</button>`}).join('')}
function renderPanel(){const area=state.active;const title=areas.find(a=>a[0]===area)?.[2]||'Panel';document.getElementById('panelTitle').textContent=title;document.getElementById('panelSub').textContent=area==='log'?'A more detailed operating trace.':area==='approvals'?'External actions waiting for your say-so.':'Live demo data generated by the same agent context.';if(area==='log'){document.getElementById('panelList').innerHTML=state.log.map(l=>`<div class="logline">${l.m}<small>${l.t}</small></div>`).join('');return}const items=areaItems(area);document.getElementById('panelList').innerHTML=items.length?items.map(itemHTML).join(''):'<div class="empty">Nothing here. The quiet kind of luxury.</div>'}
function itemHTML(i){return `<div class="item"><div class="icon">${i.icon}</div><div><strong>${i.title}</strong><small>${i.detail}</small><small>Status: ${i.status}</small></div><div class="actions">${(i.actions||[]).map(a=>`<button class="mini ${a==='approve'?'ok':a==='dismiss'?'bad':''}" onclick="act('${i.id}','${a}')">${a}</button>`).join('')}</div></div>`}
function renderLog(){document.getElementById('logList').innerHTML=state.log.slice(0,5).map(l=>`<div class="logline">${l.m}<small>${l.t}</small></div>`).join('')}function setActive(a){state.active=a;render()}window.setActive=setActive;
function act(id,action){const item=state.items.find(i=>i.id===id);if(!item)return;if(action==='approve'){item.status='approved';item.actions=['view'];addLog(`Approved: ${item.title}. Agent is executing it now.`);toast('Approved — agent executing.')}else if(action==='dismiss'){item.status='dismissed';item.actions=[];addLog(`Dismissed: ${item.title}.`);toast('Dismissed.')}else if(action==='edit'){item.detail+=' · edits requested';addLog(`Edit requested for: ${item.title}.`);toast('Edit request logged.')}else toast('Opened detail view.');render()}window.act=act;
function addLog(m){state.log.unshift({t:'Just now',m})}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function toggleSpeak(){document.getElementById('command').classList.toggle('hidden');document.getElementById('orb').classList.toggle('listening');document.getElementById('orbText').textContent=document.getElementById('orb').classList.contains('listening')?'LISTENING':'SPEAK';setTimeout(()=>document.getElementById('commandText').focus(),50)}
document.getElementById('orb').onclick=toggleSpeak;document.getElementById('openSpeak').onclick=toggleSpeak;document.getElementById('clientName').onchange=e=>{state.clientName=e.target.value||'Sarah';render()};document.getElementById('resetBtn').onclick=()=>{localStorage.removeItem('speakit.demo');state=JSON.parse(JSON.stringify(defaults));state.clientName=document.getElementById('clientName').value||initialName;render();toast('Demo reset.')};
document.getElementById('command').onsubmit=e=>{e.preventDefault();const txt=document.getElementById('commandText').value.trim();if(!txt)return;handleCommand(txt);document.getElementById('commandText').value='';toggleSpeak();render()};
function handleCommand(txt){const l=txt.toLowerCase();if(l.includes('order')||l.includes('supplies')){state.items.unshift({id:'new'+Date.now(),area:'approvals',icon:'🛒',title:'New purchase request',detail:`Agent interpreted: “${txt}” · queued for approval`,status:'waiting',actions:['approve','dismiss']});state.active='approvals';addLog(`Voice command parsed into approval: ${txt}`);toast('Purchase queued for approval.')}else if(l.includes('move')||l.includes('calendar')||l.includes('3pm')){state.items.unshift({id:'new'+Date.now(),area:'calendar',icon:'📅',title:'Calendar change proposed',detail:`Move request from: “${txt}”`,status:'waiting',actions:['approve','dismiss']});state.active='calendar';addLog(`Calendar proposal created from voice command.`);toast('Calendar change proposed.')}else if(l.includes('inbox')||l.includes('email')){state.items.unshift({id:'new'+Date.now(),area:'inbox',icon:'📩',title:'Fresh inbox summary',detail:'Agent found 3 priority messages and 9 low-signal items.',status:'done',actions:['view']});state.active='inbox';addLog('Inbox summary generated on demand.');toast('Inbox summarized.')}else{state.items.unshift({id:'new'+Date.now(),area:'approvals',icon:'✨',title:'Custom action draft',detail:`Agent drafted a plan for: “${txt}”`,status:'waiting',actions:['approve','edit','dismiss']});state.active='approvals';addLog(`Custom task converted into approval draft.`);toast('Task drafted for approval.')}}
document.getElementById('dateLine').textContent=new Date().toLocaleString([], {weekday:'long', month:'long', day:'numeric', hour:'numeric', minute:'2-digit'});render();
</script>
</body>
</html>
